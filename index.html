<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuyOng_Silicol | Profile</title>
    <style>
        :root {
            --primary-color: #00ffa3; /* Neon Green */
            --bg-color: #0a0a0a;
            --card-bg: #151515;
            --text-gray: #a0a0a0;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Subtle background glow effect */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary-color);
            filter: blur(150px);
            opacity: 0.1;
            z-index: -1;
        }

        .profile-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            width: 340px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        /* Live Roblox Avatar */
        .avatar-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid var(--primary-color);
            background: #202020;
            box-shadow: 0 0 25px rgba(0, 255, 163, 0.2);
            object-fit: cover;
        }

        h1 {
            margin: 10px 0 5px;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .tagline {
            color: var(--text-gray);
            font-size: 14px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Buttons Style */
        .links-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-discord { 
            background: #5865F2; 
            border: none;
        }
        
        .btn-junkie { 
            background: #ff4500; 
            border: none;
        }

        .btn-script { 
            border-color: #2ecc71;
            color: #2ecc71;
        }

        .btn:hover {
            transform: scale(1.03);
            filter: brightness(1.1);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        }

        .footer {
            margin-top: 35px;
            font-size: 11px;
            color: #444;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar-container">
            <img class="avatar" src="https://www.roblox.com/headshot-thumbnail/image?userId=5537576674&width=150&height=150&format=png" alt="QuyOng_Silicol Avatar">
        </div>
        
        <h1>QuyOng_Silicol</h1>
        <div class="tagline">Developer & Scripter</div>

        <div class="links-group">
            <a href="https://discord.gg/WW3f7Nmd" target="_blank" class="btn btn-discord">Discord Server</a>
            <a href="https://jnkie.com/overview/monodistx10" target="_blank" class="btn btn-junkie">Junkie Development</a>
            <a href="https://scriptblox.com/u/Unlikely_human" target="_blank" class="btn btn-script">Scriptblox Profile</a>
            <a href="https://www.roblox.com/users/5537576674/profile" target="_blank" class="btn">Roblox Profile</a>
        </div>

        <div class="footer">
            POWERED BY GITHUB • 2026
        </div>
    </div>

</body>
</html>

    <style>
        :root {
            --primary-color: #00ffa3; 
            --bg-color: #050505;
            --card-bg: #111111;
            --text-gray: #b0b0b0;
            --discord-color: #5865F2;
            --junkie-color: #A020F0; /* Purple highlight */
            --script-color: #D8BFD8; /* Light Purple highlight */
            --roblox-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        body::before {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--primary-color);
            filter: blur(180px);
            opacity: 0.15;
            z-index: -1;
        }

        .profile-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 28px;
            text-align: center;
            width: 340px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .profile-card:hover {
            transform: translateY(-10px);
            border-color: rgba(0, 255, 163, 0.3);
            box-shadow: 0 25px 70px rgba(0, 255, 163, 0.1);
        }

        .avatar-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 25px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid var(--primary-color);
            box-shadow: 0 0 30px rgba(0, 255, 163, 0.4);
            object-fit: cover;
            transition: 0.3s;
        }

        .profile-card:hover .avatar {
            transform: rotate(5deg) scale(1.05);
            box-shadow: 0 0 45px rgba(0, 255, 163, 0.6);
        }

        h1 {
            margin: 10px 0 5px;
            font-size: 24px; /* Chỉnh nhỏ lại một tí vì tên mới dài hơn */
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, var(--primary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            color: var(--text-gray);
            font-size: 14px;
            margin-bottom: 35px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .links-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn {
            position: relative;
            padding: 14px 20px;
            border-radius: 14px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 15px;
            transition: 0.3s all ease;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow: hidden;
        }

        .btn img {
            width: 22px;
            height: 22px;
            margin-right: 15px;
            object-fit: contain;
        }

        .btn:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.08);
        }

        /* Hover Effects */
        .btn-discord:hover { box-shadow: 0 0 20px rgba(88, 101, 242, 0.5); border-color: var(--discord-color); }
        .btn-junkie:hover { box-shadow: 0 0 20px rgba(160, 32, 240, 0.6); border-color: var(--junkie-color); }
        .btn-script:hover { box-shadow: 0 0 20px rgba(216, 191, 216, 0.5); border-color: var(--script-color); }
        .btn-roblox:hover { box-shadow: 0 0 20px rgba(255, 255, 255, 0.3); border-color: var(--roblox-color); }

        .btn:active {
            transform: scale(0.98);
        }

        .footer {
            margin-top: 40px;
            font-size: 10px;
            color: #444;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>

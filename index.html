<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChangBellWeMienStay | Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #00ffa3; 
            --bg-color: #050505;
            --card-bg: #111111;
            --text-gray: #b0b0b0;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        .shake-it { animation: shake 0.5s ease-in-out; }

        body {
            background: url('https://i.makeagif.com/media/11-08-2022/lqsNsd.gif') no-repeat center center fixed;
            background-size: cover;
            color: white;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background 0.8s ease-in-out;
            -webkit-tap-highlight-color: transparent;
        }

        #flash-overlay {
            position: fixed; inset: 0; background: white; opacity: 0;
            pointer-events: none; z-index: 9999;
        }

        .profile-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 28px;
            text-align: center;
            width: 340px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            z-index: 1;
        }

        .menu-btn {
            position: absolute; top: 20px; right: 20px;
            cursor: pointer; color: var(--text-gray);
            font-size: 18px; transition: 0.3s;
        }
        .menu-btn:hover { color: var(--primary-color); transform: rotate(90deg); }

        .settings-menu {
            display: none; position: absolute; top: 50px; right: 20px;
            background: #181818; border: 1px solid #333; border-radius: 12px;
            padding: 15px; width: 220px; text-align: left; z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .settings-menu.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .settings-menu label { font-size: 10px; color: var(--primary-color); font-weight: bold; display: block; margin-bottom: 8px; margin-top: 10px; }

        /* Style cho bộ chọn Background < 1 > */
        .bg-nav {
            display: flex; align-items: center; justify-content: space-between;
            background: #000; padding: 8px; border-radius: 8px; margin-bottom: 10px;
            border: 1px solid #222;
        }
        .nav-arrow { cursor: pointer; color: var(--primary-color); font-weight: 800; padding: 0 10px; user-select: none; }
        .nav-arrow:hover { transform: scale(1.2); }
        .bg-display { font-size: 12px; color: #fff; font-family: monospace; }

        .avatar-container {
            position: relative; width: 140px; height: 140px; margin: 0 auto 25px;
        }

        .avatar {
            width: 100%; height: 100%; border-radius: 50%;
            border: 3px solid var(--primary-color);
            box-shadow: 0 0 30px rgba(0, 255, 163, 0.4);
            object-fit: cover;
        }

        h1 {
            margin: 10px 0 5px; font-size: 24px; font-weight: 800;
            background: linear-gradient(to right, #fff, var(--primary-color));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .tagline { color: var(--text-gray); font-size: 14px; margin-bottom: 35px; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }

        .links-group { display: flex; flex-direction: column; gap: 16px; }

        .btn {
            position: relative; padding: 14px 20px; border-radius: 14px;
            text-decoration: none; color: white; font-weight: 600; font-size: 15px;
            transition: 0.3s all ease; display: flex; align-items: center;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn img { width: 22px; height: 22px; margin-right: 15px; object-fit: contain; }
        .btn:hover { transform: scale(1.05); background: rgba(255, 255, 255, 0.08); }

        input[type="range"] { width: 100%; accent-color: var(--primary-color); cursor: pointer; }

        .flash-trigger-btn {
            width: 100%; padding: 10px; border-radius: 8px; font-weight: 900;
            font-size: 11px; cursor: pointer; margin-top: 10px; border: none;
            transition: all 0.5s ease; text-transform: uppercase;
        }
        .neon-white { background: #fff; color: #000; box-shadow: 0 0 15px #fff; }
        .neon-black { background: #000; color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.1); border: 1px solid #333; }

        .footer { margin-top: 40px; font-size: 10px; color: #444; letter-spacing: 1px; text-transform: uppercase; }
    </style>
</head>
<body>

    <script>
        const m = document.getElementById('mus');
        const s = document.getElementById('snd');
        const o = document.getElementById('flash-overlay');
        const card = document.getElementById('card');
        const bgs = [
            'https://i.makeagif.com/media/11-08-2022/lqsNsd.gif',
            'https://i.imgur.com/lY7gDxp.gif',
            'https://i.pinimg.com/originals/85/c2/e3/85c2e3a5caec2fd8b7e6231473a84c81.gif',
            'https://i.pinimg.com/originals/3e/3a/46/3e3a46dd7a519646ebae07af05a59e28.gif',
            'https://i.pinimg.com/originals/0b/d9/a2/0bd9a29a53ba553b2fc84e2e0402bb3f.gif',
            'https://i.pinimg.com/originals/e2/cd/93/e2cd93d04934361e8b45edf807b36f6f.gif',
            'https://i.pinimg.com/originals/4a/ea/62/4aea62bee5039a1da9a1a83b4c460cb7.gif',
            'https://i.pinimg.com/originals/71/c6/13/71c613b2136a094d6bb228dbfb01c9e7.gif'
        ];
        let curBg = 0;

        function toggleMenu() { document.getElementById('sett').classList.toggle('active'); }
        
        function updateBG() { 
            document.body.style.backgroundImage = `url('${bgs[curBg]}')`; 
            document.getElementById('bg-num').innerText = `${curBg + 1} / ${bgs.length}`;
        }
        function nextBG() { curBg = (curBg + 1) % bgs.length; updateBG(); }
        function prevBG() { curBg = (curBg - 1 + bgs.length) % bgs.length; updateBG(); }

        function setVol(v) { m.volume = v / 100; }

        // Logic skip 5 giây cuối của nhạc
        m.ontimeupdate = function() {
            if (m.duration > 0 && (m.duration - m.currentTime) < 5) {
                m.currentTime = 0; // Quay lại từ đầu
                m.play();
            }
        };

        function checkTime() {
            const h = new Date().getHours();
            const btn = document.getElementById('flash-btn');
            if (h >= 0 && h < 3) {
                btn.innerText = "CLICK";
                btn.className = "flash-trigger-btn neon-white";
            } else {
                btn.innerText = "DO NOT CLICK";
                btn.className = "flash-trigger-btn neon-black";
            }
        }

        function flash() {
            s.currentTime = 0; s.play();
            card.classList.add('shake-it');
            setTimeout(() => card.classList.remove('shake-it'), 500);
            o.style.transition = 'none';
            o.style.opacity = '1';
            setTimeout(() => {
                o.style.transition = 'opacity 15s ease-out';
                o.style.opacity = '0';
            }, 150);
        }

        setInterval(checkTime, 1000);
        checkTime();
        window.onclick = () => { if(m.paused) m.play(); };
    </script>
